<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Libros</title>
    <link rel="icon" href="/img/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="clientes.html">Clientes</a>
        <a href="empleados.html">Empleados</a>
        <a href="libros.html">Libros</a>
        <a href="reservas.html">Reservas</a>
    </nav>

    <header>
        <img src="/img/logo.png" alt="Logo" class="logo">
        <h1>Registro de Libros</h1>
    </header>

    <form onsubmit="event.preventDefault(); crearLibro();">
        <input id="titulo" placeholder="Titulo" required>
        <input id="autor" placeholder="Autor" required>
        <input id="editorial" placeholder="Editorial" required>
        <input type="number" id="anio" placeholder="Año" required min="1000" max="9999" step="1">
        <input type="number" id="cantidad" placeholder="Cantidad" required min="1" step="1">

        <button type="submit">Guardar</button>
    </form>

    <ul id="listaLibros"></ul>

    <script src="script.js"></script>

    <h2>Lista de Libros</h2>

    <table border="1">

        <thead>
            <tr>
                <th>ID</th>
                <th>Titulo</th>
                <th>Autor</th>
                <th>Editorial</th>
                <th>Año</th>
                <th>Cantidad</th>
            </tr>
        </thead>

        <tbody id="tablaLibros">

        </tbody>

    </table>

</body>

</html>
